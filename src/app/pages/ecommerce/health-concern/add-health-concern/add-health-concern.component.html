<div class="container-fluid">
  <div class="row">
    <div class="col-lg-12 p-3">
      <h3 class="mb-5">Add Health Concern</h3>

      <form [formGroup]="form">
        <div class="row">
          <div class="col-lg-12 mb-3">
            <label>Logo</label>
            <ngx-dropzone
              [ngClass]="{
                'is-invalid':
                  form.get('logo').touched && form.get('logo').invalid
              }"
              (change)="onSelect($event)"
            >
              <ngx-dropzone-label
                >Drop files here or click to upload.</ngx-dropzone-label
              >
              <ngx-dropzone-preview
                class="oldImagePreview"
                *ngFor="let f of oldFiles; index as i"
                [removable]="true"
                (removed)="onRemoveOldFile(i)"
              >
                <ngx-dropzone-label
                  ><img [src]="s3Base + f.savedName"
                /></ngx-dropzone-label>
              </ngx-dropzone-preview>
              <ngx-dropzone-image-preview
                ngProjectAs="ngx-dropzone-preview"
                *ngFor="let f of files; index as i"
                [file]="f"
                [removable]="true"
                (removed)="onRemove(i)"
              >
              </ngx-dropzone-image-preview>
            </ngx-dropzone>
            <div
              *ngIf="form.get('logo').touched && form.get('logo').invalid"
              class="invalid-feedback"
            >
              <span>This field is required.</span>
            </div>
          </div>
          <div class="col-lg-6">
            <label for="name">Health Concern Name</label>
            <input
              type="text"
              [ngClass]="{
                'is-invalid':
                  form.get('name').touched && form.get('name').invalid
              }"
              class="form-control"
              name="name"
              formControlName="name"
              (blur)="trim(form.get('name'))"
              placeholder="Name"
            />
            <div
              *ngIf="form.get('name').touched && form.get('name').invalid"
              class="invalid-feedback"
            >
              <span>This field is required.</span>
            </div>
          </div>

          <div class="col-lg-6">
            <label for="metaTitle">Meta Title</label>
            <input
              type="text"
              class="form-control"
              name="metaTitle"
              placeholder="Meta Title"
              formControlName="metaTitle"
            />
          </div>

          <div class="col-lg-8 mt-3">
            <label for="metaDescription">Meta Description</label>
            <textarea
              class="form-control text-area"
              name="metaDescription"
              placeholder="Meta Description"
              formControlName="metaDescription"
            >
            </textarea>
          </div>
          <div class="col-lg-4 mt-3"
          [ngClass]="{'col-lg-2':selectChildren}">
            <label class="control-label"
            >Health Concerns</label
          >
          <ng-select
            class="select2"
            name="parent"
            bindLabel="parent"
            placeholder="Choose Parent"
            formControlName="parent"
            (change)="healthConcernSelected()"
            [multiple]="false"
          >
            <ng-option disabled value="">Choose Parent</ng-option>
            <ng-option
              *ngFor="let item of healthConcernList"
              [value]="item?._id"
            >
              {{ item?.name }}
            </ng-option>
          </ng-select>
          </div>
          <div 
          *ngIf="selectChildren"
          class="col-lg-4 mt-3">
            <label class="control-label"
            >Select Children</label
          >
          <ng-select
            class="select2"
            name="parent"
            bindLabel="parent"
            placeholder="Choose Parent"
            formControlName="child"
            (change)="childrenSelected()"
            [multiple]="false"
          >
            <ng-option
              *ngFor="let item of childrenList"
              [value]="item?._id"
            >
              {{ item?.name }}
            </ng-option>
          </ng-select>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12 mt-3">
            <div class="mb-3 mb-0">
              <label for="productdesc">Health Concern Detail</label>
              <ckeditor
                [editor]="Editor"
                formControlName="description"
              ></ckeditor>
            </div>
          </div>
        </div>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="form.invalid"
          (click)="addHealthConcern()"
        >
          {{editId?'Update':'Add'}} Health Concern
        </button>
      </form>
    </div>
  </div>
</div>
