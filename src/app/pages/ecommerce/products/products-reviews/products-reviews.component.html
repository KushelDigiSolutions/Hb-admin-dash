<div class="container-fluid">
  <app-page-title title="Product Reviews" [breadcrumbItems]="breadCrumbItems"></app-page-title>

  <div class="row">
    <div class="col-lg-12">
      <div class="card">
        <div class="card-body">
          <div class="row mb-2">
            <div class="col-md-6">
              <!-- <div class="mb-3">
                <a href="javascript:void(0);" class="btn btn-success waves-effect waves-light"
                  routerLink="add-health-package"><i class="mdi mdi-plus me-2"></i> Create New</a>
              </div> -->
            </div>

            <div class="col-md-6">
              <div class="form-inline float-md-end mb-3">
                <div class="search-box ms-2">
                  <!-- <div class="position-relative">
                        <input
                          class="form-control rounded bg-light border-0"
                          type="text"
                          name="searchTerm"
                          placeholder="Search..."
                        />
                        <i class="mdi mdi-magnify search-icon"></i>
                      </div> -->
                </div>
              </div>
            </div>
          </div>

          <div class="table-responsive mb-4">
            <table class="table table-centered mb-0 align-middle">
              <thead>
                <tr>
                  <th scope="col" style="width: 50px">
                    <div class="form-check font-size-16">
                      <input type="checkbox" class="form-check-input" id="contacusercheck" />
                      <label class="form-check-label" for="contacusercheck"></label>
                    </div>
                  </th>
                  <th scope="col">Product</th>
                  <th scope="col">Rating</th>
                  <th scope="col" style="width: 280px;">Review</th>
                  <th scope="col">User</th>
                  <th scope="col">Verified</th>
                  <th scope="col">Publish</th>
                  <!-- <th scope="col" style="width: 200px;text-align: right;">Action</th> -->
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let data of list;let index = index">
                  <td>
                    <div class="form-check font-size-16">
                      <input id="contacusercheck{{ index }}" type="checkbox" class="form-check-input" />
                      <label class="form-check-label" for="contacusercheck{{ index }}">&nbsp;</label>
                    </div>
                  </td>
                  <td>
                    <ngb-highlight [result]="(data.product?.name || '') +' ['+(data.product?.brandId?.name || '')+']'"></ngb-highlight>
                  </td>
                  <td>
                    <ngb-highlight [result]="data.star"></ngb-highlight>
                  </td>
                  <td>
                    <ngb-highlight [result]="data.review"></ngb-highlight>
                  </td>
                  <td>
                    <ngb-highlight [result]="(data.user?.firstName || '') + ' ' + (data.user?.lastName || '')">
                    </ngb-highlight>
                  </td>
                  <td>
                    <app-hb-switch defaultBoColor="#dfdfdf" size="small" color="#34c38f"
                      [loading]="data.toggleVerifiedLoading || false" [beforeChange]="toggleFxn(data,'verified')"
                      [checked]="data?.verified">
                      <i class="fa fa-spinner fa-pulse" *ngIf="data.toggleVerifiedLoading || false"></i>
                    </app-hb-switch>
                  </td>
                  <td>
                    <app-hb-switch defaultBoColor="#dfdfdf" size="small" color="#34c38f"
                      [loading]="data.togglePublishLoading || false" [beforeChange]="toggleFxn(data,'publish')"
                      [checked]="data?.publish">
                      <i class="fa fa-spinner fa-pulse" *ngIf="data.togglePublishLoading || false"></i>
                    </app-hb-switch>
                  </td>
                  <!-- <td>
                    <ul class="list-inline mb-0 text-end">
                      <li class="list-inline-item">
                        <a [routerLink]="[data._id]" href="javascript:void(0);" class="px-2 text-primary"
                          ngbTooltip="Edit"><i class="uil uil-pen font-size-18"></i></a>
                      </li>
                      <li class="list-inline-item">
                        <a (click)="removeAppointment(data._id)" href="javascript:void(0);" class="px-2 text-danger"
                          ngbTooltip="Delete"><i class="uil uil-trash-alt font-size-18"></i></a>
                      </li>
                    </ul>
                  </td> -->
                </tr>
              </tbody>
            </table>
          </div>

          <div class="row mt-4">
            <div class="col-sm-12">
              <div class="float-end">
                <ngb-pagination [collectionSize]="total" [(page)]="page" [pageSize]="limit" [boundaryLinks]="true"
                  (pageChange)="pageChanged()">
                  <ng-template ngbPaginationPages let-page let-pages="pages">
                    <li class="ngb-custom-pages-item" *ngIf="pages.length > 0">
                      <div class="form-group d-flex flex-nowrap px-2">
                        <label id="paginationInputLabel" for="paginationInput"
                          class="col-form-label mr-2 ml-1">Page</label>
                        <input #i type="text" inputmode="numeric" pattern="[0-9]*"
                          class="form-control custom-pages-input" id="paginationInput" [value]="page"
                          (keyup.enter)="selectPage(i.value)" (blur)="selectPage(i.value)"
                          (input)="formatInput($any($event).target)"
                          aria-labelledby="paginationInputLabel paginationDescription" style="width: 4rem" />
                        <span id="paginationDescription" class="col-form-label text-nowrap px-2">
                          of {{pages.length}}</span>
                      </div>
                    </li>
                  </ng-template>
                </ngb-pagination>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- end row -->
</div>
<!-- container-fluid -->
