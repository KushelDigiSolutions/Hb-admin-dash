<div class="container-fluid">
  <app-page-title
    title="Taxes"
    [breadcrumbItems]="breadCrumbItems"
  ></app-page-title>

  <div class="row">
    <div class="col-lg-12 taxClassesContainer" *ngIf="taxClasses.length">
      <ng-container *ngFor="let item of taxClasses">
        <div class="row taxClass">
          <div class="col-lg-12">
            <p class="taxClassName">
              <span>{{ item.name }}</span>
              <span class="float-lg-end removeTaxClass" (click)="removeTaxClass(item._id)"><i class="uil uil-multiply font-size-18"></i
                ></span>
            </p>
          </div>
          <div class="col-lg-12" *ngIf="item.taxSlabs.length">
            <table style="width: 100%">
              <tbody>
                <tr>
                  <th style="width: 24px">
                    <div class="form-check text-center font-size-16">
                      <input
                        disabled
                        type="checkbox"
                        class="form-check-input"
                        id="taxcheck"
                      />
                      <label class="form-check-label" for="taxcheck"></label>
                    </div>
                  </th>
                  <th>Country Code</th>
                  <th>State Code</th>
                  <th>Postal/Zip Code</th>
                  <th>City</th>
                  <th>Rate</th>
                  <th>Tax Name</th>
                  <th>Priority</th>
                </tr>
                <tr *ngFor="let tax of item.taxSlabs; let i = index">
                  <td>
                    <div class="form-check text-center">
                      <input
                        id="taxcheck{{ i }}"
                        type="checkbox"
                        class="form-check-input"
                        (change)="onChange(item, i)"
                      />
                      <label class="form-check-label" for="taxcheck{{ i }}"
                        >&nbsp;</label
                      >
                    </div>
                  </td>
                  <td>
                    <input
                      disabled
                      type="text"
                      class="form-control taxes w-75"
                      [(ngModel)]="tax.country"
                      placeholder="*"
                    />
                  </td>
                  <td>
                    <input
                      type="text"
                      class="form-control taxes w-75"
                      [(ngModel)]="tax.state"
                      placeholder="*"
                    />
                  </td>
                  <td>
                    <input
                      type="text"
                      class="form-control taxes w-75"
                      [(ngModel)]="tax.pinCode"
                      placeholder="*"
                    />
                  </td>
                  <td>
                    <input
                      type="text"
                      class="form-control taxes w-75"
                      [(ngModel)]="tax.city"
                      placeholder="*"
                    />
                  </td>
                  <td>
                    <input
                      type="text"
                      class="form-control taxes w-75"
                      [(ngModel)]="tax.rate"
                      placeholder="*"
                    />
                  </td>
                  <td>
                    <input
                      type="text"
                      class="form-control taxes w-75"
                      [(ngModel)]="tax.name"
                      placeholder="*"
                    />
                  </td>
                  <td>
                    <input
                      type="text"
                      class="form-control taxes w-75"
                      [(ngModel)]="tax.priority"
                      placeholder="*"
                    />
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="col-lg-12 m-1">
            <p>
              <span
                class="text-danger"
                (click)="removeRow(item.taxSlabs)"
                *ngIf="item.taxSlabs.length"
                >Remove row</span
              >
              <span class="text-success" (click)="addNewRow(item)"
                >Insert row</span
              >
            </p>
          </div>
        </div>
      </ng-container>
    </div>
  </div>  

  <div class="row m-2"> 
        <div class="col-lg-6 p-2">
      <form
        class="d-flex"
        [formGroup]="taxClassFormGroup"
        (ngSubmit)="addNewTaxClass()"
      >
        <input
          class="form-control"
          type="text"
          placeholder="Add new tax class"
          formControlName="name"
        />
        <button type="submit" class="btn-md btn-primary ms-2">Add New</button>
      </form>
    </div>

    <div class="col-lg-6 p-2 ">
      <button class="pull-right ms-4 btn-lg btn-success"
      (click)="saveTaxes()">Save</button>
      <button class="pull-right ms-3 btn-lg btn-danger">Remove</button>
    </div>
  </div>

</div>
