<form [formGroup]="relatedFormGroup">
  <div class="row">
    <div class="col-lg-12">
        <div class="mb-3">
          <label class="control-label"
            >Cross-sell products</label>         

          <ng-select
            class="select2"
            name="recommended"
            [items]="productList"
            bindLabel="name"
            bindValue="_id"
            placeholder="Choose Cross sell products"
            formControlName="recommended"
            (change)="productSelected()"
            [multiple]="true">
         </ng-select>
        </div>
      </div>
</div>

<div class="row mt-3">
    <div class="col-lg-12">
        <div class="mb-3">
          <label class="control-label"
            >UpSell products</label
          >        
          <ng-select
          class="select2"
          name="similar"
          [items]="productList"
          bindLabel="name"
          bindValue="_id"
          placeholder="Choose upsell products"
          formControlName="similar"
          (change)="productSelected()"
          [multiple]="true">
       </ng-select>
        </div>
      </div>
</div>
</form>
