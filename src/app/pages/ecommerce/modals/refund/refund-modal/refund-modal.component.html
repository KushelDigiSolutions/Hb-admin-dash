<div class="container-fluid">
  <div class="row">
    <div class="col-md-12 text-center py-5">
      <h2>Please enter an amount you wish to refund.</h2>
      <p style="font-size: 12px;">Amount to refund <b *ngIf="isPartialRefund">(Partial)</b> can range from &#8377;1 - &#8377;{{refundableAmount}}</p>
      <form [formGroup]="form">
        <div class="text-center my-3">
          <input
          class="form-group form-control mx-auto w-50 px-4 py-2"
          [ngClass]="{'is-invalid': form.get('refundAmount').touched && form.get('refundAmount').invalid}"
          type="number"
          min="1"
          [max]="refundableAmount"
          formControlName="refundAmount"
          placeholder="Enter Refund Amount"
        />
        <div class="invalid-feedback">Please enter a valid value</div>
        </div>
  
        <button class="btn btn-sm btn-primary mx-3" [disabled]="form.invalid" (click)="refund()">Refund</button>
          
        <button class="btn btn-sm btn-danger" (click)="cancel()">Cancel</button>
      </form>
    </div>
  </div>
</div>
