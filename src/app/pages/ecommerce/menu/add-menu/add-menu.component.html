<div class="container-fluid">

    <!-- start page title -->
    <app-page-title [title]="(editId?'Update': 'Create') + ' Menu'" [breadcrumbItems]="breadCrumbItems">
    </app-page-title>
    <!-- end page title -->

    <div class="card">
        <div class="card-body">
            <form [formGroup]="form" (submit)="onSubmit()">
                <div class="row">
                    <div class="col-lg-6">
                        <label class="h4">Select Parent</label>
                        <ul class="menu">
                            <ng-container *ngTemplateOutlet="Recursion; context:{ list: menu}"></ng-container>
                        </ul>
                    </div>
                    <div class="col-lg-5">
                        <div>
                            <!-- Select Module Start -->
                            <div class="mb-3">
                                <label class="form-label required">Module</label>
                                <select formControlName="module"
                                    [ngClass]="{'is-invalid': f.module.touched && f.module.invalid}"
                                    class="form-control" required (change)="getType($event)">
                                    <option value="">-- Select Module --</option>
                                    <option value="shop-now">Shop Now</option>
                                    <option value="consult-us">Consult Us</option>
                                    <option value="lifestyle-tips">LifeStyle Tips</option>
                                    <option value="general">General</option>
                                </select>
                                <div *ngIf="f.module.touched && f.module.invalid" class="invalid-feedback">
                                    <span>This field is required.</span>
                                </div>
                            </div>
                            <!-- Select Module End -->


                            <!-- Select Type Start -->
                            <div class="mb-3">
                                <label class="form-label required">Type</label>
                                <select formControlName="type"
                                    [ngClass]="{'is-invalid': f.type.touched && f.type.invalid}" class="form-control"
                                    required (change)="getTypeBasedList($event)">
                                    <option value="">-- Select Type --</option>
                                    <option [value]="type.value" *ngFor="let type of moduleType">{{type.name}}</option>

                                    <!-- <option value="Category">Category</option>
                                    <option value="Consult Us">Consult Us</option>
                                    <option value="Blog">Blog</option>
                                    <option value="Brand">Brand</option>
                                    <option value="Health Concern">Health Concern</option>
                                    <option value="Page">Page</option>
                                    <option value="URL">URL</option> -->
                                </select>
                                <div *ngIf="f.type.touched && f.type.invalid" class="invalid-feedback">
                                    <span>This field is required.</span>
                                </div>
                            </div>
                            <!-- Select Type End -->

                            <!-- Select List Start -->
                            <div class="mb-3" *ngIf="this.selected_module !== 'general'">
                                <label class="form-label required">List</label>
                                <!-- required -->
                                <select formControlName="list"
                                    [ngClass]="{'is-invalid': f.list.touched && f.list.invalid}" class="form-control"
                                    (change)="onChangeList($event)">
                                    <option value="">-- Select List --</option>
                                    <!-- <option [value]="data._id" *ngFor="let data of dataArray">
                                        {{data.name}}
                                    </option> -->
                                    <ng-container *ngFor="let data of dataArray">
                                        <option [value]="data._id">{{ data.name }}</option>
                                        <!-- Loop through children categories -->
                                        <ng-container *ngFor="let child of data.children">
                                            <option [value]="child._id">-- {{ child.name }}</option>
                                        </ng-container>
                                    </ng-container>
                                </select>
                                <div *ngIf="f.list.touched && f.list.invalid" class="invalid-feedback">
                                    <span>This field is required.</span>
                                </div>
                            </div>
                            <!-- Select List End -->


                            <div class="mb-3">
                                <label class="form-label"
                                    [ngClass]="{'required': selected_module === 'general'}">Name</label>
                                <input formControlName="name" type="text"
                                    [ngClass]="{'is-invalid': f.name.touched && f.name.invalid}" class="form-control"
                                    placeholder="eg. Personal Care" (blur)="trim(f.name)">
                                <div *ngIf="f.name.touched && f.name.invalid" class="invalid-feedback">
                                    <span>This field is required.</span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Is Clickable</label>
                                <select formControlName="isLink"
                                    [ngClass]="{'is-invalid': f.type.touched && f.type.invalid}" class="form-control"
                                    required>
                                    <option value="true">Yes</option>
                                    <option value="false">No</option>
                                </select>
                                <div *ngIf="f.type.touched && f.type.invalid" class="invalid-feedback">
                                    <span>This field is required.</span>
                                </div>
                            </div>
                            <!-- <div class="mb-3">
                                <label class="form-label">Parent</label>
                                <select name="parent" #parent="ngModel" [ngModel]="formValue.parent"
                                    [ngClass]="{'is-invalid': parent.touched && parent.invalid}" class="form-control"
                                    required>
                                    <option value="">-- Select Parent --</option>
                                    <option [value]="link._id" *ngFor="let link of links">{{link.name}}
                                    </option>
                                </select>
                                <div *ngIf="parent.touched && parent.invalid" class="invalid-feedback">
                                    <span>This field is required.</span>
                                </div>
                            </div> -->
                            <div class="mb-3" *ngIf="selected_module !== 'shop-now' 
                                && selected_module !== 'lifestyle-tips'
                                 && selected_module !== 'consult-us'">
                                <label class="form-label required ">URl</label>
                                <input formControlName="url" type="text"
                                    [ngClass]="{'is-invalid': f.url.touched && f.url.invalid}" class="form-control"
                                    placeholder="eg. /personal-care" (blur)="trim(f.url)">
                                <div *ngIf="f.url.touched && f.url.invalid" class="invalid-feedback">
                                    <span>This field is required.</span>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" [disabled]="form.invalid"
                                    class="btn btn-primary w-md">Submit</button>
                            </div>
                        </div>
                    </div>

                </div>
            </form>

            <ng-template #Recursion let-list="list">
                <ng-container *ngFor="let item of list">
                    <li *ngIf="editId != item._id" [formGroup]="form">
                        <div class="form-check mb-3 ps-4 pt-1 link">
                            <i *ngIf="item.children.length" class="mdi mdi-arrow-down-drop-circle-outline pointer me-3"
                                [ngClass]="{'mdi-arrow-right-drop-circle-outline': item.toggleMenu}"
                                (click)="item.toggleMenu = !item.toggleMenu"></i>
                            <!-- <label class="form-check-label">
                                <input type="radio" formControlName="parent" [value]="item._id"
                                    class="form-check-input ms-0 me-2" (change)="onChangeParent(item._id)">
                                {{ item.name }}
                            </label> -->

                            <label class="form-check-label">
                                <input type="radio" formControlName="parent" [value]="item._id"
                                    class="form-check-input ms-0 me-2" (change)="onChangeParent(item._id)"
                                    *ngIf="item.name || (item.categoryId?.name || item.brandId?.name || item.healthConcernId?.name || item.consultantTypeId?.name)">
                                {{ item.name || item.categoryId?.name || item.brandId?.name ||
                                item.healthConcernId?.name ||
                                item.consultantTypeId?.name }}
                            </label>
                        </div>
                        <ul *ngIf="item.children.length > 0" [ngClass]="{'d-none': item.toggleMenu}">
                            <ng-container *ngTemplateOutlet="Recursion; context:{ list: item.children }"></ng-container>
                        </ul>
                    </li>
                </ng-container>

            </ng-template>
        </div>
    </div>

</div>
<!-- container-fluid -->
