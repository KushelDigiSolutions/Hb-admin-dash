<div class="container-fluid">
    <div class="row">
      <div class="col-lg-12 p-3">
        <h3 class="mb-5">{{ editId ? "Update" : "Add New" }} Setting</h3>
  
        <form [formGroup]="form">
          <div class="row">
            <div class="col-lg-6 mt-3">
              <label class="control-label">Title</label>
              <input 
              type="text"
              class="form-control"
              formControlName="title"/>
            </div>
  
            <div class="col-lg-6 mt-3">
              <label for="hbCommission">Hb Commission</label>
  
              <input
                type="number"
                class="form-control"
                placeholder="Hb Commission (in percent)"
                formControlName="hbCommission"
              />
            </div>
  
            <div class="col-lg-6 mt-3">
              <label for="thirdParty">Third Party</label>
  
              <input
                type="text"
                class="form-control"
                placeholder="Third party name"
                formControlName="thirdParty"
              />
            </div>

            <div class="col-lg-6 mt-3">
                <label for="thirdPartyCommission">Third Party Commission</label>
    
                <input
                  type="number"
                  class="form-control"
                  placeholder="Third party commission (in percent)"
                  formControlName="thirdPartyCommission"
                />
              </div>
          </div>
  
          <button
            type="button"
            class="btn btn-primary mt-2"
            [disabled]="form.invalid"
            (click)="addSetting()"
          >
            {{ editId ? "Update" : "Add" }} Setting
          </button>
        </form>
      </div>
    </div>
  </div>
