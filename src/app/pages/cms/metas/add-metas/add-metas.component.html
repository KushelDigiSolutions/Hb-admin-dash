<div class="container-fluid">
  <div class="row">
    <div class="col-lg-12 p-3">
      <h3 class="mb-5">Add Meta</h3>

      <form [formGroup]="form">
        <div class="row">
          <div class="col-lg-12 mt-3">
            <label class="control-label">Page</label>
            <input 
            type="text"
            class="form-control"
            formControlName="name"/>
          </div>

          <div class="col-lg-12 mt-3">
            <label for="metaTitle">Meta Title</label>

            <input
              type="text"
              class="form-control"
              name="metaTitle"
              placeholder="Meta Title"
              formControlName="metaTitle"
            />
          </div>

          <div class="col-lg-12 mt-3">
            <label for="metaDescription">Meta Description</label>

            <textarea
              class="form-control text-area"
              name="metaDescription"
              placeholder="Meta Description"
              formControlName="metaDescription"
            >
            </textarea>
          </div>

          <div class="col-lg-12 mt-3">
            <div class="mb-3">
              <label for="tagsTemp">Meta Tags</label>
              <input
                id="tagsTemp"
                name="tagsTemp"
                type="text"
                class="form-control"
                formControlName="tagsTemp"
                (keyup.enter)="fetchTags($event.target.value)"
              />
            </div>
          </div>

          <div
            *ngIf="tempMetaTagArray.length"
            class="col-lg-12 p-3 selectedTagContainer"
          >
            <div class="d-flex">
                <p>
                    <span
                    class="selectedTags"
                    *ngFor="let item of tempMetaTagArray; let i = index"
                    >{{ item }}
                    <i class="uil uil-times me-1" (click)="removeMetaTag(i)"></i>
                  </span>
                </p>
              <span></span>
            </div>
          </div>
        </div>

        <button
          type="button"
          class="btn btn-primary mt-2"
          [disabled]="form.invalid"
          (click)="addmeta()"
        >
          {{ editId ? "Update" : "Add" }} Meta
        </button>
      </form>
    </div>
  </div>
</div>
