<div class="container-fluid">
  <app-page-title [title]="this.editId? 'Update Webinar': 'Create Webinar'" [breadcrumbItems]="breadcrumb">
  </app-page-title>
  <div class="card">
    <div class="card-body">
      <form [formGroup]="form" (submit)="onSubmit()">
        <div class="row">
          <div class="col-lg-12 mb-3">
            <label class="required">Thumbnail</label>
            <app-dropzone formControlName="thumbnail" [multiple]="false" accept="image/png,image/jpg,image/jpeg"
              [ngClass]="{'is-invalid': (submitted || form.get('thumbnail').touched) && form.get('thumbnail').invalid}">
            </app-dropzone>
            <div class="invalid-feedback">
              <span>This field is required.</span>
            </div>
          </div>
          <div class="col-lg-12 mb-3">
            <label class="required">Webinar Title</label>
            <input type="text" class="form-control"
              [ngClass]="{'is-invalid': (submitted || form.get('title').touched) && form.get('title').invalid}"
              formControlName="title" placeholder="Title" />
            <div class="invalid-feedback">
              <span>This field is required.</span>
            </div>
          </div>
          <div class="col-lg-12 mb-3">
            <label>Description</label>
            <textarea formControlName="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="col-lg-12 mb-3">
            <label>Meta Title</label>
            <input formControlName="metaTitle" type="text" class="form-control" placeholder="Enter meta title" />
          </div>
          <div class="col-lg-12 mb-3">
            <label>Meta Description</label>
            <textarea formControlName="metaDescription" class="form-control" rows="3"></textarea>
          </div>
          <div class="col-lg-12 mb-3">
            <label>Attachments <small>(PNG, JPG, JPEG, PDF, PPT, PTTX, DOC, DOCX)</small></label>
            <app-dropzone formControlName="attachments" accept="image/png,image/jpeg,.pdf,.ppt,.pptx,.doc,.docx">
            </app-dropzone>
            <div *ngIf="oldData" class="mt-3">
              <a [href]="s3Base+file.savedName" target="_blank" *ngFor="let file of oldData.attachments; last as last">{{file.originalName}} <ng-container *ngIf="!last">, </ng-container> </a>
            </div>
          </div>
          <div class="col-lg-12 mb-3">
            <div class="form-check form-switch mb-3" dir="ltr">
              <input formControlName="isActive" type="checkbox" class="form-check-input" id="ActiveSwitch1">
              <label class="form-check-label" for="ActiveSwitch1"> Active</label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">{{this.editId?'Update':'Submit'}}</button>
      </form>
    </div>
  </div>
</div>
