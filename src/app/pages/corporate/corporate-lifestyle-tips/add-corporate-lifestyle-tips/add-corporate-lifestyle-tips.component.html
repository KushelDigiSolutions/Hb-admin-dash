<div class="container-fluid">
  <app-page-title [title]="this.editId? 'Update Lifestyle tip': 'Add Lifestyle tip'" [breadcrumbItems]="breadcrumb">
  </app-page-title>
  <div class="card">
    <div class="card-body">
      <form [formGroup]="form" (submit)="onSubmit()">
        <div class="row">
          <div class="col-lg-12 mb-3">
            <label class="required">Select Lifestyle Tip</label>
            <ng-select formControlName="lifestyleTip" [items]="lifestyleTips" bindLabel="title" bindValue="_id" class="select2" [ngClass]="{'is-invalid': submitted && f.lifestyleTip.invalid}"
              placeholder="Search Lifestyle Tips" [multiple]="false"
              (search)="subject$.next($event.term)">
            </ng-select>
            <div class="invalid-feedback">This field is required</div>
          </div>

          <div class="col-lg-12 mb-3">
            <div class="form-check form-switch mb-3" dir="ltr">
              <input formControlName="isActive" type="checkbox" class="form-check-input" id="ActiveSwitch1">
              <label class="form-check-label" for="ActiveSwitch1"> Active</label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">{{this.editId?'Update':'Submit'}}</button>
      </form>
    </div>
  </div>
</div>
