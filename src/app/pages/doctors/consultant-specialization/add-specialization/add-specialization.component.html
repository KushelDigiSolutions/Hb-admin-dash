<div class="container-fluid">
  <div class="row">
    <div class="col-lg-12 p-3">
      <h3 class="mb-5">{{ editId ? "Update" : "Add" }} Specialization</h3>

      <form [formGroup]="form">
        <div class="row">
          <div class="col-lg-12 mb-3">
            <label>Specialization Icon</label>
            <ngx-dropzone [ngClass]="{
                  'is-invalid':
                    form.get('logo').touched && form.get('logo').invalid
                }" (change)="onSelect($event)">
              <ngx-dropzone-label>Drop files here or click to upload.</ngx-dropzone-label>
              <ngx-dropzone-preview class="oldImagePreview" *ngFor="let f of oldFiles; index as i" [removable]="true"
                (removed)="onRemoveOldFile(i)">
                <ngx-dropzone-label><img [src]="s3Base + f.savedName" /></ngx-dropzone-label>
              </ngx-dropzone-preview>
              <ngx-dropzone-image-preview ngProjectAs="ngx-dropzone-preview" *ngFor="let f of files; index as i"
                [file]="f" [removable]="true" (removed)="onRemove(i)">
              </ngx-dropzone-image-preview>
            </ngx-dropzone>
            <div *ngIf="form.get('logo').touched && form.get('logo').invalid" class="invalid-feedback">
              <span>This field is required.</span>
            </div>
          </div>
          <div class="col-lg-6 mb-3">
            <label for="name">Specialization Name</label>

            <input type="text" [ngClass]="{
                  'is-invalid':
                    form.get('name').touched && form.get('name').invalid
                }" class="form-control" name="name" formControlName="name" placeholder="Name" />
            <div *ngIf="form.get('name').touched && form.get('name').invalid" class="invalid-feedback">
              <span>This field is required.</span>
            </div>
          </div>
          <div class="col-lg-6 mb-3">
            <label for="sequence">Sequence</label>
            <input type="number" [ngClass]="{'is-invalid': form.get('sequence').touched && form.get('sequence').invalid
                }" class="form-control" name="sequence" formControlName="sequence" min="0" placeholder="e.g. 2" />
            <div *ngIf="form.get('sequence').touched && form.get('sequence').invalid" class="invalid-feedback">
              <span>This field is required.</span>
            </div>
          </div>

          <div class="col-lg-6 mb-3">
            <label class="control-label">Speciality</label>
            <ng-select class="select2" placeholder="Choose Type" formControlName="typeId"
              (change)="SpecialitySelected($event)" [multiple]="true">
              <ng-option disabled value="">Choose Parent</ng-option>
              <ng-option *ngFor="let item of categoriesList" [value]="item?._id">
                {{ item?.name }}
              </ng-option>
            </ng-select>
          </div>

              <input
                type="text"
                class="form-control"
                name="metaTitle"
                placeholder="Meta Title"

            </div>

                {{ item?.name }}
              </ng-option>
            </ng-select>
            </div> -->

        <button type="button" class="btn btn-primary mt-3" [disabled]="form.invalid" (click)="addSpecialization()">
          {{ editId ? "Update" : "Add" }} Specialization
        </button>
      </form>
    </div>
  </div>
</div>
