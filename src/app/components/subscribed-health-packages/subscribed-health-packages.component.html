<div class="container-fluid">
    <app-page-title title="Subscribed Packages" [breadcrumbItems]="breadcrumb"></app-page-title>
    <div class="card">
        <div class="card-body">
            <div class="dataTables_length">
                <label class="d-inline-flex align-items-center">Show<select name="limit" [(ngModel)]="limit"
                        class="
                      custom-select custom-select-sm
                      form-control form-control-sm form-select form-select-sm
                    " (change)="changeValue(limit, 'limit')">
                        <option [ngValue]="10">10</option>
                        <option [ngValue]="25">25</option>
                        <option [ngValue]="50">50</option>
                        <option [ngValue]="100">100</option>
                    </select>
                    entries</label>
            </div>
            <div class="table-responsive mb-4">
                <table class="table table-centered mb-0 align-middle">
                    <thead>
                        <tr>
                            <th scope="col">Id</th>
                            <th scope="col">Purchase Date</th>
                            <th scope="col">Package Name</th>
                            <th scope="col">Pateint</th>
                            <th scope="col">Customized</th>
                            <th scope="col">Status</th>
                            <th scope="col" style="width: 200px; text-align: right"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let data of list; let index = index">
                            <td>
                                <ngb-highlight [result]="data.orderId"></ngb-highlight>
                            </td>
                            <td><ngb-highlight [result]="data.createdAt | date:'d MMM, YYYY'"></ngb-highlight></td>
                            <td>
                                <ngb-highlight [result]="data.name">
                                </ngb-highlight>
                            </td>
                            <td>
                                {{data.user?.firstName}} {{data.user?.lastName}}
                            </td>
                            <td>
                                <ngb-highlight [result]="data.isCustomized"></ngb-highlight>
                            </td>
                            <td>
                                <ngb-highlight [result]="data.status" class="badge rounded-pill bg-soft-success font-size-12"></ngb-highlight>
                            </td>
                            <td>
                                <ul class="list-inline mb-0 text-end">
                                    <li class="list-inline-item">
                                        <a [routerLink]="[data._id]"
                                            class="px-2 text-primary"
                                            ngbTooltip="View Details"><i class="uil uil-eye font-size-18"></i>
                                            View</a>
                                    </li>
                                    <li class="list-inline-item">
                                        <a href="javascript:void(0)"
                                            class="px-2 text-danger"
                                            ngbTooltip="Delete"
                                            (click)="onDelete(data, index)"><i class="uil uil-trash-alt font-size-18"></i>
                                            Delete</a>
                                    </li>
                                </ul>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="row mt-4">
                <div class="col-sm-12">
                    <div *ngIf="total" class="float-end">
                        <ngb-pagination [collectionSize]="total" [pageSize]="limit" [(page)]="page" [boundaryLinks]="true"
                            (pageChange)="pageChanged()">
                            <ng-template ngbPaginationPages let-page let-pages="pages">
                                <li class="ngb-custom-pages-item" *ngIf="pages.length > 0">
                                    <div class="form-group d-flex flex-nowrap px-2">
                                        <label id="paginationInputLabel" for="paginationInput"
                                            class="col-form-label mr-2 ml-1">Page</label>
                                        <input #i type="text" inputmode="numeric" pattern="[0-9]*"
                                            class="form-control custom-pages-input" id="paginationInput" [value]="page"
                                            (keyup.enter)="selectPage(i.value)" (blur)="selectPage(i.value)"
                                            (input)="formatInput($any($event).target)"
                                            aria-labelledby="paginationInputLabel paginationDescription"
                                            style="width: 4rem" />
                                        <span id="paginationDescription" class="col-form-label text-nowrap px-2">
                                            of {{ pages.length }}</span>
                                    </div>
                                </li>
                            </ng-template>
                        </ngb-pagination>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
