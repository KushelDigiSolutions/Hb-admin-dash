<ng-template #medicalAttachmentModal role="document" let-modal>
  <div class="modal-header">
    <h5 class="modal-title mt-0">Attachment</h5>
    <span>
      <i class="uil-multiply float-end font-size-20 pointer" (click)="modal.dismiss('Cross click')">
      </i>
    </span>
  </div>

  <div class="modal-body">
    <div class="d-block" style="text-align: center">
      <ng-container *ngIf="showImageBlock">
        <img [src]="imageUrl + currentOpenedAttachment" />
      </ng-container>
      <ng-container *ngIf="!showImageBlock">
        <iframe width="100%" height="450" title="Medical Record" [src]="currentOpenedAttachment"></iframe>
      </ng-container>
    </div>
  </div>
</ng-template>
